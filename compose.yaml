services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: book_lamp_dev
      POSTGRES_USER: book_lamp
      POSTGRES_PASSWORD: book_lamp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U book_lamp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
